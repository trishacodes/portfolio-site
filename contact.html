<!DOCTYPE html>
<html>
<head>
  <title>Contact Me</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- Navbar -->
  <div class="navbar">
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="contact.html">Contact</a>
  </div>

  <div class="container">

    <!-- Heading Card -->
    <div class="card center">
      <h1>Let's Connect 💬</h1>
      <p>Have an idea, collab, or just wanna say hi? Drop a message!</p>
    </div>

    <!-- Contact Info Cards -->
    <div class="grid">

      <div class="card">
        <h2>📧 Email</h2>
        <p>trisha@email.com</p>
      </div>

      <div class="card">
        <h2>📱 Phone</h2>
        <p>+91 98765 43210</p>
      </div>

      <div class="card">
        <h2>📍 Location</h2>
        <p>Kolkata, India</p>
      </div>

      <div class="card">
        <h2>🌐 Social</h2>
        <p>
          Instagram <br>
          LinkedIn <br>
          GitHub
        </p>
      </div>

    </div>

    <!-- Contact Form -->
    <div class="card">
      <h2>Send a Message ✉️</h2>

      <form>
        <label>Name:</label><br>
        <input  id ="name" type="text" placeholder="Enter your name"><br><br>

        <label>Email:</label><br>
        <input  id="email" type="email" placeholder="Enter your email"><br><br>

        <label>Message:</label><br>
        <textarea rows="4" placeholder="Type your message..."></textarea><br><br>

        <button type="submit">Send 🚀</button>
      </form>
    </div>

    <!-- Footer Line -->
    <div class="card center">
      <p>✨ Built with passion by Trisha</p>
    </div>

  </div>
<script src="script.js"></script>
</body>
</html>
